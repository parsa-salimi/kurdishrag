<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Parsa writes about music — album reviews, favourite lists, longer essays." />
  <title>Parsa — Music</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">PARSA</div>
    <div class="tagline">ALBUM REVIEWS · LISTS · ESSAYS</div>
  </header>

  <nav>
    <a onclick="showTab('main')">MAIN</a>
    <a onclick="showTab('albums')">ALBUMS</a>
    <a onclick="showTab('lists')">LISTS</a>
    <a onclick="showTab('essays')">ESSAYS</a>
    <a onclick="showTab('contact')">CONTACT</a>
  </nav>

  <section id="main">
    <h2>WELCOME</h2>
    <p>I write about music. <a onclick="showTab('albums')">Album reviews</a>, <a onclick="showTab('lists')">favourite lists</a>, and <a onclick="showTab('essays')">longer essays</a> — nothing else. Ratings are out of 10.</p>

    <h3>LATEST</h3>
    <div id="latest-feed" class="latest-feed"></div>
  </section>

  <section id="albums" style="display:none;">
    <h2>ALBUM REVIEWS</h2>

    <div class="toolbar">
      <span class="toolbar-label">SORT:</span>
      <button class="sort-btn active" data-target="albums" data-sort="date">RECENT</button>
      <button class="sort-btn" data-target="albums" data-sort="rating">RATING</button>
      <button class="sort-btn" data-target="albums" data-sort="artist">ARTIST A–Z</button>
    </div>

    <div id="album-reviews" class="reviews"></div>
  </section>

  <section id="lists" style="display:none;">
    <h2>LISTS</h2>
    <div id="lists-container"></div>
  </section>

  <section id="essays" style="display:none;">
    <h2>ESSAYS</h2>
    <div id="essays-container" class="journal"></div>
  </section>

  <section id="contact" style="display:none;">
    <h2>CONTACT</h2>

    <form id="contact-form" class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <div class="form-group">
        <label for="name">NAME</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="email">EMAIL</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="subject">SUBJECT</label>
        <input type="text" id="subject" name="subject">
      </div>

      <div class="form-group">
        <label for="message">MESSAGE</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" class="submit-btn">SEND MESSAGE</button>

      <div class="form-message"></div>
    </form>
  </section>

  <footer>
    <p>parsa · kurdishrag.ca</p>
  </footer>

  <script src="projects.js"></script>
  <script src="script.js"></script>
</body>
</html>
